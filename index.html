<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>El Ojo Ecpático</title>

  <link rel="stylesheet"
        href="estilos.css">

</head>

<body>

  <main id="universo">

    <!-- OJO -->

    <div id="ojo">
      <img id="ojo-img" src="assets/ojo/neutro.png" alt="Ojo central">
    </div>

    <!-- ORBITA -->

    <div id="orbita"></div>

    <!-- PALABRAS -->

    <div class="palabra" data-angulo="0" data-eye="Derecha">RASTRO</div>
    <div class="palabra" data-angulo="45" data-eye="DerArriba">PULSO</div>
    <div class="palabra" data-angulo="90" data-eye="Arriba">ECO</div>
    <div class="palabra" data-angulo="135" data-eye="IzqArriba">RITMO</div>
    <div class="palabra" data-angulo="180" data-eye="izquierda">VESTIGIO</div>
    <div class="palabra" data-angulo="225" data-eye="IzqAbajo">UMBRAL</div>
    <div class="palabra" data-angulo="270" data-eye="Abajo">CARTOGRAFÍA</div>
    <div class="palabra" data-angulo="315" data-eye="DerAbajo">DERIVA</div>

  </main>

  <!-- MODAL -->

  <div id="modal">

    <div id="contenido-modal">

      <button id="cerrar-modal">
        ✕
      </button>

      <h2>
        EL OJO OBSERVA
      </h2>

      <p>
        Acá puede abrirse:
      </p>

      <ul>
        <li>la app p5.js</li>
        <li>el mapa</li>
        <li>la instalación</li>
        <li>videos</li>
      </ul>

    </div>

  </div>

  <script src="sistema.js"></script>

</body>
</html>
