<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>El Ojo Ecpático</title>

  <link rel="stylesheet"
        href="estilos.css">

</head>

<body>

  <main id="universo">

    <!-- OJO -->

    <div id="ojo">
      ◉
    </div>

    <!-- ORBITA -->

    <div id="orbita"></div>

    <!-- PALABRAS -->

    <div class="palabra" data-angulo="0">
      RASTRO
    </div>

    <div class="palabra" data-angulo="60">
      ECO
    </div>

    <div class="palabra" data-angulo="120">
      DERIVA
    </div>

    <div class="palabra" data-angulo="180">
      VESTIGIO
    </div>

    <div class="palabra" data-angulo="240">
      UMBRAL
    </div>

    <div class="palabra" data-angulo="300">
      CARTOGRAFÍA
    </div>

  </main>

  <!-- MODAL -->

  <div id="modal">

    <div id="contenido-modal">

      <button id="cerrar-modal">
        ✕
      </button>

      <h2>
        EL OJO OBSERVA
      </h2>

      <p>
        Acá puede abrirse:
      </p>

      <ul>
        <li>la app p5.js</li>
        <li>el mapa</li>
        <li>la instalación</li>
        <li>videos</li>
      </ul>

    </div>

  </div>

  <script src="sistema.js"></script>

</body>
</html>
