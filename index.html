<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>El Ojo Ecpático</title>

  <link rel="stylesheet"
        href="estilos.css">

</head>

<body>

  <main id="universo">

    <!-- OJO -->

    <div id="ojo">
      <img id="ojo-img" src="assets/ojo/neutro.png" alt="Ojo central">
    </div>

    <!-- ORBITA -->

    <div id="orbita"></div>

    <!-- PALABRAS -->

    <div class="palabra" data-angulo="0" data-eye="Derecha" data-title="SOMOS" data-text="Una ventana emergente con información del proyecto a modificar.">SOMOS</div>
    <div class="palabra" data-angulo="51.4" data-eye="DerArriba" data-link="https://www.facebook.com/profile.php?id=61589682839717" data-mobile-link="fb://profile/61589682839717" data-link-text="Abrir Facebook">PULSO</div>
    <div class="palabra" data-angulo="102.8" data-eye="Arriba" data-link="https://www.facebook.com/share/g/1JGiWv4uG9/" data-mobile-link="fb://facewebmodal/f?href=https://www.facebook.com/share/g/1JGiWv4uG9/" data-link-text="Abrir grupo de Facebook">ECO</div>
    <div class="palabra" data-angulo="154.2" data-eye="IzqArriba" data-title="VESTIGIO" data-text="Información en la ventana emergente del Backstage a modificar...">VESTIGIO</div>
    <div class="palabra" data-angulo="205.7" data-eye="izquierda" data-link="https://www.youtube.com/watch?v=G507822Q1cY" data-mobile-link="vnd.youtube:G507822Q1cY" data-link-text="Ver YouTube">ORIGEN</div>
    <div class="palabra" data-angulo="257.1" data-eye="IzqAbajo" data-link="https://www.tiktok.com" data-mobile-link="tiktok://" data-link-text="Ver TikTok">DERIVA</div>
    <div class="palabra" data-angulo="308.5" data-eye="DerAbajo" data-title="BRÚJULA" data-text="Ventana emergente con mapa e información.">BRÚJULA</div>

  </main>

  <!-- MODAL -->

  <!-- ROTATE SCREEN NOTICE 
  <div id="rotate-screen" aria-hidden="true">
    <div class="rotate-content">
      <div class="rotate-emoji">↻</div>
      <div class="rotate-text">Gira tu dispositivo a horizontal para esta experiencia</div>
    </div>
  </div>
  -->


  <div id="modal">

    <div id="contenido-modal">

      <button id="cerrar-modal">
        ✕
      </button>

      <h2 id="modal-title">
        EL OJO OBSERVA
      </h2>

      <p id="modal-text">
        Selecciona una opción para ver más detalles.
      </p>

      <div id="modal-action"></div>

    </div>

  </div>

  <script src="sistema.js"></script>

</body>
</html>
