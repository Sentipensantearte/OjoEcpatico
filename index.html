    <div class="palabra" data-angulo="0" data-eye="Derecha" data-title="SOMOS" data-text="El Ojo Ecpático es una experiencia transmedia que nace de una pregunta sencilla y perturbadora: ¿qué ocurre cuando mirar deja de alcanzarnos?<br><br>Habitamos un tiempo donde el dolor ajeno circula sin descanso entre pantallas, titulares, algoritmos y desplazamientos infinitos. Vemos más que nunca, pero pareciera que cada vez nos afecta menos. Entre la empatía y la apatía aparece un territorio gris: la ecpatía, entendida como la capacidad de apartar el sufrimiento para protegerse de él.<br><br>Este proyecto propone detenerse en ese límite.<br><br>A través de una instalación inmersiva, una aplicación interactiva, redes sociales, materiales audiovisuales y un espacio participativo, El Ojo Ecpático invita a sostener la mirada un poco más de lo habitual y preguntarse qué hacemos con aquello que vemos.<br><br>El proyecto fue desarrollado por Charo D'Ercole y Ramiro Sinagra como Trabajo Final Integrador de la Tecnicatura Universitaria en Producción Digital de la Universidad Nacional de Quilmes.<br><br>No buscamos ofrecer respuestas cerradas.<br><br>Buscamos abrir una conversación.<br><br>Porque quizás el primer acto de resistencia siga siendo mirar.">SOMOS</div>

    <div class="palabra" data-angulo="45" data-eye="DerArriba" data-link="https://www.facebook.com/profile.php?id=61589682839717" data-mobile-link="fb://profile/61589682839717" data-link-text="Abrir Facebook">PULSO</div>

    <div class="palabra" data-angulo="90" data-eye="Arriba" data-link="https://www.facebook.com/share/g/1JGiWv4uG9/" data-mobile-link="fb://facewebmodal/f?href=https://www.facebook.com/share/g/1JGiWv4uG9/" data-link-text="Abrir grupo de Facebook">ECO</div>

    <div class="palabra" data-angulo="135" data-eye="IzqArriba" data-link="/fanzine.html" data-link-text="Abrir fanzine" data-direct-link="true">VESTIGIO</div>

    <div class="palabra" data-angulo="180" data-eye="izquierda" data-title="RITMO" data-text="Mantené la mirada en la ventana que quieras sosteniendo el click." data-link="https://editor.p5js.org/Sentipensantearte/full/lqjYCxS2F" data-link-text="Abrir p5.js">RITMO</div>
    <div class="palabra" data-angulo="225" data-eye="IzqAbajo" data-link="https://www.youtube.com/embed/G507822Q1cY?si=6tFvWKExyVdGuyuM" data-mobile-link="vnd.youtube:G507822Q1cY" data-link-text="Ver YouTube">ORIGEN</div>
    <div class="palabra" data-angulo="270" data-eye="Abajo" data-link="https://www.instagram.com/ojo_ecpatico/" data-link-text="Ver Instagram">DERIVA</div>
    <div class="palabra" data-angulo="315" data-eye="DerAbajo" data-title="BRÚJULA" data-text="No hay un recorrido correcto.<br><br>Al ingresar a la instalación encontrarás un espacio en penumbras. El Ojo ecpático te estará observando. Lo que escuchás, ¿está ahí? El ojo ecpático dice que no, que no los escuches, se pone incómodo cuando hablan de eso.<br><br>Los hilos que sostienen el scroll son esos hilos que nos guían por la instalación, la verdad, no sabemos quiénes los mueven.<br><br>Si en algún momento te cruzás con alguna noticia, no nos hacemos cargo de lo que veas, por ahí son esos sonidos que decías escuchar. ¿De repente no los escuchas más?<br><br>Dicen que al final algunos dejan su huella, ese activismo compartido, ¿servirá de algo?<br><br>Por visitar al ojo te llevás un recuerdo, un QR que te permite continuar la experiencia en la web; sí, seguro ya lo tenés porque estás acá leyendo esto: vas a poder explorar todos los lugares donde se extiende el ojo ecpático y mediante las redes, formar parte de la experiencia.<br><br>Tu turno de ver.">BRÚJULA</div>
